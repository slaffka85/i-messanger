server:
  port: 8080

logging:
  level:
    com.imessanger: DEBUG
    org.springframework.web.socket: INFO

spring:
  application:
    name: i-messanger

  datasource:
    url: jdbc:postgresql://localhost:5432/imessanger
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: imessanger-storage
