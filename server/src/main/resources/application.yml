server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax

logging:
  level:
    com.imessanger: DEBUG
    org.springframework.web.socket: INFO

spring:
  application:
    name: i-messanger

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/imessanger}
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            scope: profile, email
            # Force account selection screen
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: imessanger-storage

app:
  frontend:
    url: https://imessanger.tssv85.com
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - https://localhost:5173
      - https://127.0.0.1:5173
      - https://imessanger.tssv85.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
